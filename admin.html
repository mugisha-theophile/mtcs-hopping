<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Admin Dashboard</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Products</a></li>
                <li><a href="#">Blogs</a></li>
                <li><a href="#">Settings</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="loading-indicator" style="display:none;">
            <p>Loading, please wait...</p>
        </section>
        <section id="content">
            <h2>Dashboard Overview</h2>
            <!-- Responsive components and performance optimization can be added here -->
            <p>A brief overview of product and blog metrics goes here.</p>
            <div class="error-modal" style="display:none;">
                <p>An error occurred. Please try again later.</p>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Admin Dashboard</p>
    </footer>
    <script>
        // Show loading indicator on data fetch
        function showLoading() {
            document.getElementById('loading-indicator').style.display = 'block';
        }

        // Hide loading indicator
        function hideLoading() {
            document.getElementById('loading-indicator').style.display = 'none';
        }

        // Error handling
        function handleError() {
            document.querySelector('.error-modal').style.display = 'block';
        }
    </script>
</body>
</html>
