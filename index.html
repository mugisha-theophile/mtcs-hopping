    <title>Mugisha Theophile - Global Marketplace</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand: #D9A066;
            --brand-dark: #c4884d;
            --text-primary: #1a1a2e;
            --text-muted: #8b8da3;
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fb;
            --border-color: #e8e9ee;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.06), 0 4px 10px rgba(0, 0, 0, 0.04);
        }

        body {
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            color: var(--text-primary);
            background-color: var(--bg-primary);
        }

        .products-section {
            padding: 3rem 0;
            background: white;
        }

        .products-section:nth-child(even) {
            background: #f8f9fb;
        }

        .products-section h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: var(--text-primary);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .product-card {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            background: white;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .product-img {
            width: 100%;
            height: 200px;
            background: var(--bg-secondary);
            overflow: hidden;
            flex-shrink: 0;
        }

        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .product-body {
            padding: 1.25rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .product-name {
            margin: 0 0 0.5rem 0;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .product-category {
            margin: 0 0 0.75rem 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .product-price {
            margin: 0 0 1rem auto 0;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--brand);
        }

        .product-btn {
            width: 100%;
            background: var(--brand);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .product-btn:hover {
            background: var(--brand-dark);
        }
    </style>
</head>

<body>

    <!-- Featured Products -->
    <section class="products-section">
        <div class="container-lg">
            <h2>⭐ Featured Products</h2>
            <div class="product-grid" id="featured-products-list">
                <p style="text-align:center; color: var(--text-muted); grid-column: 1/-1;">Loading...</p>
            </div>
        </div>
    </section>

    <!-- Popular Products -->
    <section class="products-section">
        <div class="container-lg">
            <h2>🔥 Popular Products</h2>
            <div class="product-grid" id="popular-products-list">
                <p style="text-align:center; color: var(--text-muted); grid-column: 1/-1;">Loading...</p>
            </div>
        </div>
    </section>

    <!-- All Products -->
    <section class="products-section">
        <div class="container-lg">
            <h2>📦 All Products</h2>
            <div class="product-grid" id="all-products-list">
                <p style="text-align:center; color: var(--text-muted); grid-column: 1/-1;">Loading...</p>
            </div>
        </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', loadAllProducts);

        async function loadAllProducts() {
            try {
                const response = await fetch('/api/products?limit=200');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                let products = Array.isArray(data) ? data : (data.products || []);
                
                const featured = products.filter(p => p.isFeatured === true && p.isPopular !== true);
                const popular = products.filter(p => p.isPopular === true && p.isFeatured !== true);
                const all = products.filter(p => p.isFeatured !== true && p.isPopular !== true);
                
                renderProducts('featured-products-list', featured);
                renderProducts('popular-products-list', popular);
                renderProducts('all-products-list', all);
                
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function renderProducts(containerId, products) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            if (!products.length) {
                container.innerHTML = `<p style="text-align:center; color: var(--text-muted); grid-column: 1/-1;">No products available</p>`;
                return;
            }
            
            products.forEach(p => {
                const img = p.image ? (p.image.startsWith('data:') ? p.image : `data:image/jpeg;base64,${p.image}`) : 'https://via.placeholder.com/300';
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-img">
                        <img src="${img}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/300'">
                    </div>
                    <div class="product-body">
                        <h3 class="product-name">${p.name || 'Product'}</h3>
                        <p class="product-category">${p.category || 'Item'}</p>
                        <p class="product-price">$${parseFloat(p.price || 0).toFixed(2)}</p>
                        <button class="product-btn" onclick="alert('✅ Added to cart!')">🛒 Add to Cart</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }
    </script>

</body>
</html>
